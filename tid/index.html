<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3b82f6">

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tid">
  <link rel="apple-touch-icon" href="icons/icon.svg">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>Tid</title>
</head>
<body>

  <!-- ── Loading ─────────────────────────────────────────── -->
  <div id="loading-screen" class="fullscreen-overlay">
    <div class="spinner"></div>
  </div>

  <!-- ── Login ───────────────────────────────────────────── -->
  <div id="login-screen" class="fullscreen-overlay hidden">
    <div class="login-card">
      <img src="icons/icon.svg" alt="Tid" class="login-logo">
      <h1 class="login-title">Tidsregistrering</h1>
      <p class="login-subtitle">Log ind for at komme i gang</p>
      <button id="btn-google-login" class="btn btn-google btn-full btn-large">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Log ind med Google
      </button>
    </div>
  </div>

  <!-- ── App ─────────────────────────────────────────────── -->
  <div id="app" class="hidden">

    <!-- Active timer banner — udfyldes i Trin 4 -->
    <div id="active-timer-banner" class="hidden"></div>

    <!-- Page content -->
    <main id="main-content">

      <div id="view-hjem" class="view hidden">
        <!-- Trin 4: Timer + hurtigstart -->
        <div class="view-placeholder">Hjem — klar i Trin 4</div>
      </div>

      <div id="view-historik" class="view hidden">
        <!-- Trin 6: Historik med redigering -->
        <div class="view-placeholder">Historik — klar i Trin 6</div>
      </div>

      <div id="view-rapporter" class="view hidden">
        <!-- Trin 7: Rapporter + budget -->
        <div class="view-placeholder">Rapporter — klar i Trin 7</div>
      </div>

      <div id="view-aktiviteter" class="view hidden">
        <!-- Trin 3: CRUD aktiviteter -->
        <div class="view-placeholder">Aktiviteter — klar i Trin 3</div>
      </div>

      <div id="view-indstillinger" class="view hidden">
        <!-- Trin 9: Fuld indstillingsside -->
        <h2 class="view-title">Indstillinger</h2>
        <div class="settings-section">
          <button id="btn-logout" class="btn btn-danger btn-full">Log ud</button>
        </div>
      </div>

    </main>

    <!-- Bottom navigation -->
    <nav id="bottom-nav">

      <button class="nav-btn" data-view="hjem" aria-label="Hjem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Hjem</span>
      </button>

      <button class="nav-btn" data-view="historik" aria-label="Historik">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Historik</span>
      </button>

      <button class="nav-btn" data-view="rapporter" aria-label="Rapporter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
          <line x1="2" y1="20" x2="22" y2="20"/>
        </svg>
        <span>Rapporter</span>
      </button>

      <button class="nav-btn" data-view="aktiviteter" aria-label="Aktiviteter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span>Aktiviteter</span>
      </button>

      <button class="nav-btn" data-view="indstillinger" aria-label="Indstillinger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span>Indstillinger</span>
      </button>

    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
