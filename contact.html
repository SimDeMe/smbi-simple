<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kontakt – smbi.dk</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">smbi.dk</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link"><i class="ph ph-house"></i> Forside</a>
        <a href="biologi.html" class="nav-link"><i class="ph ph-dna"></i> Biologi</a>
        <a href="geografi.html" class="nav-link"><i class="ph ph-globe-hemisphere-west"></i> Geografi</a>
        <a href="born.html" class="nav-link"><i class="ph ph-star"></i> Børn</a>
        <a href="contact.html" class="nav-link active"><i class="ph ph-envelope"></i> Kontakt</a>
      </div>
    </div>
  </nav>

  <header class="page-hero">
    <div class="page-hero-inner">
      <div>
        <div class="page-hero-eyebrow">smbi.dk</div>
        <h1 class="page-hero-title"><em>Kontakt</em></h1>
        <p class="page-hero-sub">Send en besked via formularen herunder.</p>
      </div>
    </div>
  </header>

  <main class="container">

    <p class="section-label">Skriv til mig</p>

    <div class="card">
      <div class="card-header">
        <i class="ph ph-envelope card-header-icon"></i>
        <span class="card-header-title">Besked</span>
      </div>
      <div class="card-body">
        <form class="contact-form" action="https://formspree.io/f/maqwwlzd" method="POST">
          <label>
            Din email
            <input type="email" name="email" required placeholder="navn@email.dk" />
          </label>
          <label>
            Besked
            <textarea name="message" required placeholder="Hej …"></textarea>
          </label>
          <button type="submit"><i class="ph ph-paper-plane-tilt"></i> Send</button>
        </form>
        <div id="formStatus" class="alert" aria-live="polite" style="display:none"></div>
        <p class="muted small" style="margin-top:1rem;">Formspree håndterer afsendelsen – jeg ser ikke din adresse andre steder.</p>
      </div>
    </div>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>
        <div class="footer-brand">smbi.dk</div>
        <div class="footer-meta">Naturgeografi &amp; Biologi · © <span id="year"></span></div>
      </div>
    </div>
  </footer>

  <script src="site.js"></script>
  <script>
    const form = document.querySelector(".contact-form");
    const statusBox = document.getElementById("formStatus");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusBox.textContent = "Sender...";
      statusBox.className = "alert info";
      statusBox.style.display = "";

      try {
        const res = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { Accept: "application/json" },
        });

        if (res.ok) {
          statusBox.textContent = "Tak for din besked! Jeg vender tilbage så hurtigt som muligt.";
          statusBox.className = "alert success";
          form.reset();
        } else {
          throw new Error("Send fejlede");
        }
      } catch (err) {
        statusBox.textContent = "Noget gik galt. Prøv igen, eller send direkte til min mail.";
        statusBox.className = "alert error";
      }
    });
  </script>
</body>
</html>
